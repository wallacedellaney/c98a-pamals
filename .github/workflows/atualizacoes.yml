name: Atualizações automáticas

# Horários em UTC (o Brasil, sem horário de verão, é UTC-3). Minutos quebrados
# (não em hora cheia) de propósito — o GitHub recomenda isso pra reduzir o
# atraso de agendamentos gratuitos, que ficam sobrecarregados bem na hora
# cheia (confirmado na prática em 2026-07-07: agendado pra 13h/15h UTC, só
# rodou de verdade às 19h25/21h06 UTC — ~6h de atraso).
# Disponibilidade Diária: seg-sex ~10h07 local = 13h07 UTC
# Emergências + RAC + Vencimentos TMOT: seg-sex ~12h22 local = 15h22 UTC (mesmo horário, rodam os 3)
# Pagamentos: toda segunda ~10h37 local = 13h37 UTC
on:
  schedule:
    - cron: "7 13 * * 1-5"
    - cron: "22 15 * * 1-5"
    - cron: "37 13 * * 1"
  workflow_dispatch:
    inputs:
      fonte:
        description: "Fonte para atualizar manualmente"
        required: true
        type: choice
        options:
          - disponibilidade_diaria
          - emergencias
          - pagamentos
          - rac
          - vencimentos_tmot

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Configurar credencial do Google (a partir do Secret)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p .secrets
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > .secrets/service_account.json

      - name: Configurar identidade git (pro commit automático)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determinar quais fontes atualizar
        id: fonte
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "nomes=${{ inputs.fonte }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 13 * * 1-5" ]; then
            echo "nomes=disponibilidade_diaria" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "22 15 * * 1-5" ]; then
            echo "nomes=emergencias rac vencimentos_tmot" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "37 13 * * 1" ]; then
            echo "nomes=pagamentos" >> "$GITHUB_OUTPUT"
          fi

      - name: Buscar, reprocessar e enviar pro GitHub
        run: |
          for fonte in ${{ steps.fonte.outputs.nomes }}; do
            python3 shared/executar_atualizacao.py "$fonte"
          done
