name: Atualizações automáticas

# A pedido do Wallace em 2026-07-09: em vez de 1 horário por fonte, roda
# TODAS as fontes juntas, de 2 em 2 horas, seg-sex — contorna o atraso do
# agendamento gratuito do GitHub (confirmado em 2026-07-07: agendado pra
# 13h/15h UTC, só rodou de verdade às 19h25/21h06 UTC) rodando com mais
# frequência: mesmo que uma vez atrase ou falhe, a próxima (2h depois) já
# pega o dado atualizado. Sem problema rodar sem ter nada novo — cada fonte
# só commita se algo realmente mudou (ver shared/executar_atualizacao.py).
#
# Horário UTC (Brasil, sem horário de verão, é UTC-3) — minuto quebrado
# (:07, não hora cheia) pra reduzir atraso: 11h07, 13h07, 15h07, 17h07,
# 19h07, 21h07, 23h07 UTC = 8h07, 10h07, 12h07, 14h07, 16h07, 18h07, 20h07
# local — cobre o horário comercial de 2 em 2 horas.
on:
  schedule:
    - cron: "7 11,13,15,17,19,21,23 * * 1-5"
  workflow_dispatch:
    inputs:
      fonte:
        description: "Fonte para atualizar manualmente (ou 'todos')"
        required: true
        type: choice
        default: "todos"
        options:
          - todos
          - disponibilidade_diaria
          - emergencias
          - pagamentos
          - rac
          - vencimentos_tmot
          - mta
          - tpjl
          - tpjl_extras
          - reparaveis
          - devolucoes
          - motores

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Configurar credencial do Google (a partir do Secret)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p .secrets
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > .secrets/service_account.json

      - name: Configurar identidade git (pro commit automático)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Buscar, reprocessar e enviar pro GitHub
        run: python3 shared/executar_atualizacao.py "${{ inputs.fonte || 'todos' }}"
